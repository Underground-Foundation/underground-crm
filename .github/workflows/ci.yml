name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: underground_crm.settings
      REDIS_URL: redis://127.0.0.1:6379
      # Note: We omit PostgreSQL credentials to automatically trigger the SQLite fallback
      # defined in underground_crm/settings.py for CI/CD test execution.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev gettext-base

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,migration]

      - name: Strict Formatting Check (Black)
        run: black --check underground_crm underground_email migration

      - name: Static Analysis Linting (Pylint)
        run: pylint --load-plugins=pylint_django --django-settings-module=underground_crm.settings --errors-only underground_crm underground_email

      - name: Execute Test Suite (Pytest)
        run: pytest
