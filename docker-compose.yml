services:
  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Addressr uses OpenSearch as its index. OpenSearch requires the host kernel
  # setting vm.max_map_count=262144. On Linux: sudo sysctl -w vm.max_map_count=262144
  opensearch:
    image: opensearchproject/opensearch:1.3.20
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
    ports:
      - "9200:9200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Serves docker/gnaf-package.json as a fake CKAN API response for addressr-loader.
  # data.gov.au's CKAN API (/api/3/action/) no longer works; this bypasses it.
  gnaf-api:
    image: nginx:alpine
    volumes:
      - ./docker/gnaf-package.json:/usr/share/nginx/html/gnaf-package.json:ro
    restart: unless-stopped

  # Australian address search and geocoding. Run update-gnaf.sh to refresh G-NAF data
  # or to load it for the first time.
  # https://addressr.io/quick-start/
  # https://github.com/mountain-pass/addressr
  addressr:
    image: mountainpass/addressr
    environment:
      - ELASTIC_HOST=opensearch
      - ELASTIC_PORT=9200
      - ADDRESSR_ENABLE_GEO=1
      - GNAF_PACKAGE_URL=http://gnaf-api/gnaf-package.json
      # Node.js defaults to ~1.4GB heap, which OOMs on large states (NSW has 5M addresses).
      - NODE_OPTIONS=--max-old-space-size=8192
    volumes:
      - ./data/addressr:/home/node/target
    ports:
      - "8080:8080"
    depends_on:
      opensearch:
        condition: service_healthy
      gnaf-api:
        condition: service_started
    restart: unless-stopped
