repos:
  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        files: ^(underground_crm|underground_email|underground_payments|migration)/

  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: .venv/bin/pylint
        language: system
        types: [python]
        files: ^(underground_crm|underground_email|underground_payments|migration)/
        args:
          - --load-plugins=pylint_django
          - --django-settings-module=underground_crm.pylint_settings
          - --errors-only
